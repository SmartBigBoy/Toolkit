  <style>
/* ============================
   iOS Notes Scanner - Styles
   ============================ */
:root {
    --yellow: #FFD60A; --green: #34C759; --blue: #007AFF; --red: #FF3B30;
    --white: #FFFFFF; --black: #000000;
    --gray-100: #F2F2F7; --gray-200: #E5E5EA; --gray-300: #D1D1D6;
    --gray-400: #C7C7CC; --gray-500: #AEAEB2; --gray-600: #8E8E93;
    --gray-700: #636366; --gray-800: #3A3A3C; --gray-900: #1C1C1E;
    --safe-top: env(safe-area-inset-top, 20px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --nav-height: 44px; --toolbar-height: 90px;
    --font: -apple-system, 'Helvetica Neue', 'SF Pro Display', sans-serif;
}
html, body { width:100%; height:100%; overflow:hidden; font-family:var(--font); background:#000; color:#fff; }
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }

.screen { position:fixed; inset:0; display:none; flex-direction:column; background:#000; pointer-events:none; }
.screen.active { display:flex; pointer-events:all; }

#scanner-viewfinder { flex:1; position:relative; overflow:hidden; background:#000; }
#scanner-video { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
#scanner-overlay { position:absolute; inset:0; width:100%; height:100%; z-index:2; opacity:0; }
#scanner-overlay.visible { opacity:1; }

#scan-lines { position:absolute; inset:0; z-index:1; pointer-events:none; opacity:0; }
#scan-lines.active { opacity:1; }
#scan-lines::before { content:''; position:absolute; left:10%; right:10%; height:2px; background:linear-gradient(90deg,transparent,var(--yellow),transparent); animation:scanMove 2s ease-in-out infinite; box-shadow:0 0 12px rgba(255,214,10,0.3); }
@keyframes scanMove { 0%,100%{top:20%} 50%{top:80%} }

#detection-frame { position:absolute; inset:0; z-index:3; display:none; pointer-events:none; }
#detection-frame.visible, #detection-frame.detected { display:block; }
#detection-frame .frame-label { position:absolute; bottom:calc(20% - 32px); left:50%; transform:translateX(-50%); font-size:13px; font-weight:500; letter-spacing:0.3px; opacity:0; text-shadow:0 1px 4px rgba(0,0,0,0.5); white-space:nowrap; }
#detection-frame.detected .frame-label { opacity:1; }
#detection-frame.state-searching .frame-corner { border-color:rgba(255,255,255,0.35); opacity:0.6; }
#detection-frame.state-searching .frame-label { color:rgba(255,255,255,0.5); }
#detection-frame.state-tracking .frame-corner { border-color:var(--yellow); opacity:1; }
#detection-frame.state-tracking .frame-label { color:var(--yellow); opacity:1; }
#detection-frame.state-stable .frame-corner { border-color:var(--green); opacity:1; }
#detection-frame.state-stable .frame-label { color:var(--green); opacity:1; }

.frame-corner { position:absolute; width:28px; height:28px; border-color:var(--yellow); }
.frame-corner.tl { top:20%; left:10%; border-top:3px solid var(--yellow); border-left:3px solid var(--yellow); border-radius:4px 0 0 0; }
.frame-corner.tr { top:20%; right:10%; border-top:3px solid var(--yellow); border-right:3px solid var(--yellow); border-radius:0 4px 0 0; }
.frame-corner.bl { bottom:20%; left:10%; border-bottom:3px solid var(--yellow); border-left:3px solid var(--yellow); border-radius:0 0 0 4px; }
.frame-corner.br { bottom:20%; right:10%; border-bottom:3px solid var(--yellow); border-right:3px solid var(--yellow); border-radius:0 0 4px 0; }

#camera-prompt { position:absolute; inset:0; z-index:10; display:none; flex-direction:column; align-items:center; justify-content:center; background:#000; padding:40px 32px; text-align:center; }
#camera-prompt.visible { display:flex; }
.camera-prompt-icon { width:80px; height:80px; border-radius:20px; background:var(--gray-800); display:flex; align-items:center; justify-content:center; margin-bottom:24px; color:var(--yellow); }
#camera-prompt h2 { font-size:20px; font-weight:600; margin-bottom:8px; color:#fff; }
#camera-prompt p { font-size:15px; color:var(--gray-500); margin-bottom:32px; }
#btn-start-camera { background:var(--blue); color:#fff; border:none; border-radius:12px; padding:14px 40px; font-size:17px; font-weight:600; font-family:var(--font); cursor:pointer; }

#scanner-notch { position:absolute; top:0; left:0; right:0; z-index:5; display:flex; align-items:center; justify-content:space-between; padding:var(--safe-top) 12px 0; height:calc(var(--safe-top) + var(--nav-height)); background:linear-gradient(to bottom,rgba(0,0,0,0.6),transparent); }
.nav-btn { background:none; border:none; color:var(--yellow); font-size:17px; font-family:var(--font); cursor:pointer; padding:8px 4px; min-width:60px; display:flex; align-items:center; justify-content:center; }
.nav-btn.done-btn { color:var(--yellow); font-weight:600; }
#btn-close { color:#fff; justify-content:flex-start; }
#notch-center { display:flex; align-items:center; gap:6px; font-size:15px; font-weight:500; color:#fff; }
.mode-btn { background:none; border:none; color:rgba(255,255,255,0.5); font-size:15px; font-weight:500; font-family:var(--font); padding:2px 4px; cursor:pointer; }
.mode-btn.active { color:#fff; }
#notch-divider { color:rgba(255,255,255,0.25); font-size:14px; }
#notch-right { display:flex; align-items:center; gap:2px; }

#continuous-bar { position:absolute; top:calc(var(--safe-top) + var(--nav-height) + 8px); left:50%; transform:translateX(-50%); z-index:6; display:flex; align-items:center; gap:12px; padding:6px 14px 6px 18px; border-radius:20px; background:rgba(0,0,0,0.55); backdrop-filter:blur(8px); white-space:nowrap; }
#continuous-count { font-size:14px; font-weight:500; color:#fff; }
#btn-continuous-done { background:var(--yellow); border:none; color:#000; font-size:13px; font-weight:600; font-family:var(--font); padding:5px 14px; border-radius:14px; cursor:pointer; }

#scanner-toolbar { position:relative; z-index:5; background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.4),transparent); padding-bottom:var(--safe-bottom); }
.toolbar-inner { display:flex; align-items:center; justify-content:space-around; padding:16px 30px; }
.toolbar-btn { background:none; border:none; color:#fff; cursor:pointer; width:44px; height:44px; display:flex; align-items:center; justify-content:center; opacity:0.8; }
.toolbar-btn.active { opacity:1; color:var(--yellow); }
.shutter-btn { background:none; border:none; cursor:pointer; padding:0; width:72px; height:72px; display:flex; align-items:center; justify-content:center; }
.shutter-outer { width:68px; height:68px; border-radius:50%; border:4px solid #fff; display:flex; align-items:center; justify-content:center; }
.shutter-inner { width:54px; height:54px; border-radius:50%; background:#fff; }

#screen-adjust { background:#000; }
#adjust-header { display:flex; align-items:center; justify-content:space-between; padding:var(--safe-top) 12px 0; height:calc(var(--safe-top) + var(--nav-height)); background:var(--gray-900); border-bottom:0.5px solid var(--gray-800); }
#adjust-title { font-size:17px; font-weight:600; }
#btn-adjust-retake { color:var(--blue); font-size:17px; justify-content:flex-start; }
#adjust-container { flex:1; position:relative; overflow:hidden; display:flex; align-items:center; justify-content:center; background:#000; touch-action:none; }
#adjust-image-wrap { position:relative; display:inline-block; line-height:0; }
#adjust-image { display:block; max-width:100vw; max-height:calc(100vh - 120px - var(--safe-top) - var(--safe-bottom)); object-fit:contain; }
#adjust-overlay { position:absolute; inset:0; touch-action:none; }
#adjust-svg { width:100%; height:100%; display:block; }
.corner-handle { position:absolute; width:44px; height:44px; margin:-22px 0 0 -22px; cursor:grab; touch-action:none; z-index:5; }
.corner-handle::before { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:20px; height:20px; border-radius:50%; border:1.5px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.4); }

#corner-magnifier { position:absolute; z-index:10; pointer-events:none; display:none; transform:translate(-50%,-50%); }
#corner-magnifier.active { display:block; }
#corner-magnifier .magnifier-ring { width:60px; height:60px; border-radius:50%; overflow:hidden; border:1.5px solid rgba(255,255,255,0.85); box-shadow:0 0 20px rgba(0,0,0,0.3); background:#fff; }

#adjust-hint { position:absolute; bottom:calc(var(--safe-bottom) + 16px); left:0; right:0; text-align:center; font-size:13px; color:var(--gray-400); z-index:3; }

#screen-preview { background:var(--gray-100); color:#000; }
#preview-header { display:flex; align-items:center; justify-content:space-between; padding:var(--safe-top) 12px 0; height:calc(var(--safe-top) + var(--nav-height)); background:var(--gray-100); border-bottom:0.5px solid var(--gray-300); z-index:2; }
#preview-title { font-size:17px; font-weight:600; color:#000; }
#btn-preview-back { color:var(--blue); justify-content:flex-start; min-width:44px; }
#btn-preview-save { color:var(--blue); min-width:44px; }

#preview-pages { background:var(--gray-100); padding:8px 12px; display:flex; align-items:center; gap:10px; border-bottom:0.5px solid var(--gray-300); overflow-x:auto; scrollbar-width:none; }
#pages-scroll { display:flex; gap:8px; align-items:center; }
.page-thumb { width:52px; height:66px; border-radius:8px; overflow:hidden; flex-shrink:0; border:2px solid transparent; cursor:pointer; background:#fff; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.page-thumb.active { border-color:var(--blue); box-shadow:0 0 0 1px var(--blue),0 2px 8px rgba(0,122,255,0.2); }
.page-thumb img { width:100%; height:100%; object-fit:cover; }
.page-thumb .page-delete { position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background:var(--red); color:#fff; border:2px solid var(--gray-100); font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 4px rgba(255,59,48,0.35); }
#page-counter { margin-left:auto; font-size:13px; font-weight:500; color:var(--gray-500); white-space:nowrap; }
.add-page-btn { width:52px; height:66px; border-radius:8px; border:2px dashed var(--gray-400); background:transparent; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--blue); font-size:11px; font-weight:500; font-family:var(--font); }

#preview-main { flex:1; display:flex; align-items:center; justify-content:center; padding:16px; overflow:hidden; background:var(--gray-100); }
#preview-image { max-width:100%; max-height:100%; object-fit:contain; border-radius:10px; box-shadow:0 4px 24px rgba(0,0,0,0.10),0 1px 4px rgba(0,0,0,0.06); background:#fff; }

#filter-sheet { background:#fff; border-top:0.5px solid var(--gray-300); }
#filter-options { display:flex; justify-content:center; gap:4px; padding:8px 12px 10px; }
.filter-option { display:flex; flex-direction:column; align-items:center; gap:6px; background:none; border:none; cursor:pointer; font-family:var(--font); font-size:11px; font-weight:500; color:var(--gray-500); padding:6px 10px; min-width:56px; border-radius:10px; }
.filter-option.active { color:var(--blue); background:rgba(0,122,255,0.08); }
.filter-preview { width:48px; height:62px; border-radius:8px; display:flex; align-items:center; justify-content:center; border:1.5px solid var(--gray-200); overflow:hidden; }
.filter-option.active .filter-preview { border-color:var(--blue); box-shadow:0 0 0 0.5px var(--blue); }

.capture-badge { position:absolute; left:12px; bottom:12px; z-index:20; padding:3px 10px; border-radius:10px; font-size:11px; font-weight:500; color:#fff; background:rgba(0,0,0,0.45); backdrop-filter:blur(4px); display:none; pointer-events:none; }
.capture-badge.visible { display:block; }
#adjust-hint .capture-badge { position:static; display:inline-block; background:rgba(0,0,0,0.35); font-size:12px; }

#preview-actions { display:flex; gap:10px; padding:10px 16px; padding-bottom:calc(10px + var(--safe-bottom)); background:#fff; border-top:0.5px solid var(--gray-300); }
.action-btn { flex:1; display:flex; align-items:center; justify-content:center; gap:6px; padding:13px 16px; border-radius:12px; font-size:15px; font-weight:600; font-family:var(--font); cursor:pointer; border:none; }
.primary-btn { background:var(--blue); color:#fff; }
.secondary-btn { background:var(--gray-200); color:var(--blue); }

.toast { position:fixed; bottom:120px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(0,0,0,0.8); color:#fff; padding:10px 24px; border-radius:10px; font-size:14px; font-weight:500; z-index:100; opacity:0; pointer-events:none; backdrop-filter:blur(10px); }
.toast.visible { opacity:1; transform:translateX(-50%) translateY(0); }

.spinner { width:24px; height:24px; border:3px solid var(--gray-300); border-top-color:var(--blue); border-radius:50%; animation:spin 0.6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

.processing-overlay { position:fixed; inset:0; z-index:200; background:rgba(0,0,0,0.4); display:none; align-items:center; justify-content:center; backdrop-filter:blur(4px); }
.processing-box { background:rgba(255,255,255,0.95); border-radius:16px; padding:28px 36px; display:flex; flex-direction:column; align-items:center; gap:14px; box-shadow:0 8px 40px rgba(0,0,0,0.18); }
#processing-text { font-size:15px; font-weight:500; color:#333; }

.pwa-banner { display:flex; align-items:center; gap:8px; padding:8px 12px; margin:0 12px; border-radius:8px; background:var(--gray-200); flex-shrink:0; }
#pwa-banner-text { flex:1; font-size:13px; font-weight:500; color:var(--gray-700); }

body { overscroll-behavior:none; }

@media (prefers-color-scheme: dark) {
  #screen-preview, #preview-header, #preview-pages, #preview-main { background:var(--gray-900); color:#fff; }
  #preview-title { color:#fff; }
  #preview-pages { border-bottom-color:var(--gray-800); }
  #filter-sheet { background:var(--gray-800); border-top-color:var(--gray-700); }
  .filter-option { color:var(--gray-400); }
  .filter-option.active { color:var(--yellow); background:rgba(255,214,10,0.10); }
  .filter-preview { border-color:var(--gray-600); }
  .filter-option.active .filter-preview { border-color:var(--yellow); }
  #preview-actions { background:var(--gray-800); border-top-color:var(--gray-700); }
  .secondary-btn { background:var(--gray-700); color:var(--yellow); }
  .page-thumb .page-delete { border-color:var(--gray-900); }
  #page-counter { color:var(--gray-500); }
  .add-page-btn { border-color:var(--gray-600); color:var(--yellow); }
  .pwa-banner { background:var(--gray-800); }
  #pwa-banner-text { color:var(--gray-300); }
  .processing-box { background:rgba(50,50,54,0.95); }
  #processing-text { color:#eee; }
}

@media (orientation: landscape) {
  .toolbar-inner { padding:8px 40px; }
  #detection-frame .frame-corner.tl { top:12%; left:15%; }
  #detection-frame .frame-corner.tr { top:12%; right:15%; }
  #detection-frame .frame-corner.bl { bottom:12%; left:15%; }
  #detection-frame .frame-corner.br { bottom:12%; right:15%; }
}
  </style>
</head>
<body>
<!-- ==================== Scanner Screen ==================== -->
<div id="screen-scanner" class="screen active">
  <div id="scanner-viewfinder">
    <video id="scanner-video" autoplay playsinline muted></video>
    <canvas id="scanner-overlay"></canvas>
    <div id="scan-lines"></div>
    <div id="detection-frame">
      <div class="frame-corner tl"></div>
      <div class="frame-corner tr"></div>
      <div class="frame-corner bl"></div>
      <div class="frame-corner br"></div>
      <div class="frame-label">自动扫描中…</div>
    </div>
    <div id="scanner-notch">
      <button id="btn-close" class="nav-btn" aria-label="关闭">取消</button>
      <div id="notch-center">
        <button id="btn-mode-single" class="mode-btn active">单张</button>
        <span id="notch-divider">|</span>
        <button id="btn-mode-continuous" class="mode-btn">连续</button>
      </div>
      <div id="notch-right">
        <button id="btn-switch-camera" class="nav-btn" aria-label="切换摄像头" style="display:none"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
        <button id="btn-flash" class="nav-btn" aria-label="闪光灯"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></button>
      </div>
    </div>
    <div id="continuous-bar" style="display:none">
      <span id="continuous-count">已扫 0 页</span>
      <button id="btn-continuous-done" class="nav-btn">完成</button>
    </div>
    <div id="camera-prompt">
      <div class="camera-prompt-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
      <h2>使用相机扫描文稿</h2>
      <p>允许访问相机以开始扫描</p>
      <button id="btn-start-camera">允许访问相机</button>
    </div>
    <div class="capture-badge"></div>
  </div>
  <div id="scanner-toolbar">
    <div class="toolbar-inner">
      <button id="btn-gallery" class="toolbar-btn" aria-label="相册"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
      <button id="btn-shutter" class="shutter-btn" aria-label="拍摄"><div class="shutter-outer"><div class="shutter-inner"></div></div></button>
      <button id="btn-auto" class="toolbar-btn active" aria-label="自动扫描"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
    </div>
  </div>
</div>

<!-- ==================== Adjust Screen ==================== -->
<div id="screen-adjust" class="screen">
  <div id="adjust-header">
    <button id="btn-adjust-retake" class="nav-btn">重新扫描</button>
    <span id="adjust-title">调整扫描区域</span>
    <button id="btn-adjust-done" class="nav-btn done-btn">存储</button>
  </div>
  <div id="adjust-container">
    <div id="adjust-image-wrap">
      <img id="adjust-image" alt="扫描图像">
      <div id="adjust-overlay">
        <svg id="adjust-svg" viewBox="0 0 100 100" preserveAspectRatio="none"><polygon id="adjust-polygon" points="5,5 95,5 95,95 5,95" fill="rgba(255,255,255,0.08)" stroke="#FFFFFF" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg>
        <div id="corner-tl" class="corner-handle" data-index="0"></div>
        <div id="corner-tr" class="corner-handle" data-index="1"></div>
        <div id="corner-br" class="corner-handle" data-index="2"></div>
        <div id="corner-bl" class="corner-handle" data-index="3"></div>
      </div>
    </div>
    <div id="adjust-hint"><div class="capture-badge"></div></div>
  </div>
</div>

<!-- ==================== Preview Screen ==================== -->
<div id="screen-preview" class="screen">
  <div id="preview-header">
    <button id="btn-preview-back" class="nav-btn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <span id="preview-title">扫描文稿</span>
    <button id="btn-preview-save" class="nav-btn done-btn">存储</button>
  </div>
  <div id="preview-pages">
    <div id="pages-scroll"></div>
    <button id="btn-add-page" class="add-page-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>添加</span></button>
    <span id="page-counter"></span>
  </div>
