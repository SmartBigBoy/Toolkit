<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高铁到站播报 - 在线工具箱</title>
  <meta name="description" content="高铁到站语音播报工具，输入站名即可播放'列车即将到达XX站'语音，支持下载">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous">
  <style>
    .train-wrap { max-width: 480px; margin: 0 auto; padding: 20px 0; text-align: center; }
    .train-card { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); border-radius: 20px; padding: 40px 32px; color: #fff; box-shadow: 0 8px 32px rgba(15,52,96,0.3); position: relative; overflow: hidden; }
    .train-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.03) 0%, transparent 50%); pointer-events: none; }
    .train-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 8px; }
    .train-header i { font-size: 24px; color: #4fc3f7; }
    .train-header span { font-size: 16px; font-weight: 600; letter-spacing: 2px; color: #4fc3f7; }
    .train-line { width: 60px; height: 2px; background: rgba(79,195,247,0.3); margin: 16px auto; }
    .train-station { font-size: 42px; font-weight: 800; letter-spacing: 4px; margin: 8px 0; min-height: 56px; color: #fff; }
    .train-input-wrap { margin: 20px 0; }
    .train-input { width: 220px; padding: 12px 16px; border: none; border-radius: 12px; font-size: 20px; font-weight: 600; text-align: center; background: rgba(255,255,255,0.1); color: #fff; font-family: inherit; outline: none; transition: background 0.3s; }
    .train-input::placeholder { color: rgba(255,255,255,0.35); }
    .train-input:focus { background: rgba(255,255,255,0.18); }
    .train-text { font-size: 14px; opacity: 0.7; margin: 12px 0 20px; min-height: 40px; line-height: 1.6; color: rgba(255,255,255,0.8); }
    .train-presets { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
    .train-preset { padding: 6px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.8); font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .train-preset:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.3); }
    .train-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .train-btn { padding: 14px 28px; border: none; border-radius: 14px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; }
    .train-btn.play { background: #4fc3f7; color: #1a1a2e; box-shadow: 0 4px 12px rgba(79,195,247,0.3); }
    .train-btn.play:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,195,247,0.4); }
    .train-btn.play:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .train-btn.dl { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
    .train-btn.dl:hover { background: rgba(255,255,255,0.18); }
    .train-hint { font-size: 13px; color: var(--text-tertiary); margin-top: 20px; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="../index.html" class="logo"><i class="fas fa-wrench"></i><h1>在线工具箱</h1></a>
    </div>
  </header>
  <main class="main">
    <div class="container">
      <div class="tool-container" style="display:block">
        <div class="train-wrap">
          <div class="train-card">
            <div class="train-header"><i class="fas fa-train"></i><span>高铁广播系统</span></div>
            <div class="train-line"></div>
            <div class="train-station" id="trainDisplay">北京南</div>
            <div class="train-text" id="trainText">输入站名，点击播放</div>
            <div class="train-presets">
              <button class="train-preset" data-station="北京南">北京南</button>
              <button class="train-preset" data-station="上海虹桥">上海虹桥</button>
              <button class="train-preset" data-station="广州南">广州南</button>
              <button class="train-preset" data-station="深圳北">深圳北</button>
              <button class="train-preset" data-station="杭州东">杭州东</button>
              <button class="train-preset" data-station="成都东">成都东</button>
              <button class="train-preset" data-station="武汉">武汉</button>
              <button class="train-preset" data-station="西安北">西安北</button>
              <button class="train-preset" data-station="长沙南">长沙南</button>
              <button class="train-preset" data-station="南京南">南京南</button>
            </div>
            <div class="train-input-wrap">
              <input type="text" id="stationInput" class="train-input" placeholder="输入站名…">
            </div>
            <div class="train-btns">
              <button id="trainPlay" class="train-btn play"><i class="fas fa-play"></i> 播放</button>
              <button id="trainDl" class="train-btn dl"><i class="fas fa-download"></i> 下载</button>
            </div>
          </div>
          <div class="train-hint">语音播报使用浏览器 TTS 引擎，效果因设备和语音包而异</div>
        </div>
      </div>
    </div>
  </main>
  <footer class="footer container"><p>© 2026 在线工具箱 | 简洁高效的工具集合</p></footer>
  <script>
    const stationInput = document.getElementById('stationInput');
    const trainText = document.getElementById('trainText');
    const trainDisplay = document.getElementById('trainDisplay');
    const trainPlay = document.getElementById('trainPlay');

    function announce() {
      let station = stationInput.value.trim();
      if (!station) { station = stationInput.placeholder; stationInput.value = station; }
      trainDisplay.textContent = station;
      window.speechSynthesis.cancel();
      const text = '女士们先生们，列车即将到达' + station + '站。请整理好您的行李物品，准备下车。';
      trainText.textContent = text;
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-CN'; u.rate = 0.82; u.pitch = 1.05; u.volume = 1;
      trainPlay.disabled = true; trainPlay.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 播报中';
      u.onend = () => { trainPlay.disabled = false; trainPlay.innerHTML = '<i class="fas fa-play"></i> 播放'; };
      window.speechSynthesis.speak(u);
    }

    document.querySelectorAll('.train-preset').forEach(el => {
      el.addEventListener('click', () => { stationInput.value = el.dataset.station; announce(); });
    });
    trainPlay.addEventListener('click', announce);
    stationInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') announce(); });

    // 下载
    document.getElementById('trainDl').addEventListener('click', () => {
      let station = stationInput.value.trim();
      if (!station) { station = '北京南'; stationInput.value = station; }
      const text = '女士们先生们，列车即将到达' + station + '站。';
      trainDisplay.textContent = station;

      const sr = 44100; const dur = 2.0; const ns = Math.floor(sr * dur);
      const buf = new ArrayBuffer(44 + ns * 2); const v = new DataView(buf);
      function ws(o, s) { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
      ws(0,'RIFF'); v.setUint32(4, 36 + ns * 2, true); ws(8,'WAVE'); ws(12,'fmt ');
      v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
      v.setUint32(24, sr, true); v.setUint32(28, sr * 2, true); v.setUint16(32, 2, true); v.setUint16(34, 16, true);
      ws(36,'data'); v.setUint32(40, ns * 2, true);

      for (let i = 0; i < ns; i++) {
        const t = i / sr; let sample = 0;
        if (t < 0.15) { sample = Math.sin(2 * Math.PI * 880 * t) * 0.3 * (1 - t/0.15); }
        else if (t < 0.2) {}
        else if (t < 0.35) { const tt = t - 0.2; sample = Math.sin(2 * Math.PI * 1320 * tt) * 0.25 * (1 - tt/0.15); }
        else if (t < 0.4) {}
        else { sample = Math.sin(2 * Math.PI * 440 * t) * 0.06 * Math.max(0, 1 - (t-0.4)/1.6); }
        const val = Math.max(-32768, Math.min(32767, Math.round(sample * 32767)));
        v.setInt16(44 + i * 2, val, true);
      }

      const blob = new Blob([buf], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob); const a = document.createElement('a');
      a.href = url; a.download = '高铁到站_' + station + '.wav';
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 5000);
      trainText.textContent = '✅ 音频已下载（含提示音）';
      setTimeout(() => { trainText.textContent = text; }, 2000);
    });
  </script>
  <script src="../js/tools_data.js"></script>
