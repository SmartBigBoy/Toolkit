<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汇率换算 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .currency-container {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .currency-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            text-align: center;
        }

        .currency-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .currency-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .currency-body {
            padding: 32px;
        }

        .conversion-block {
            margin-bottom: 32px;
            padding: 24px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border-left: 4px solid #8b5cf6;
        }

        .conversion-block:last-child {
            margin-bottom: 0;
        }

        .block-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-title i {
            color: #8b5cf6;
        }

        .convert-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: center;
            margin-bottom: 20px;
        }

        .currency-input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-secondary);
            transition: all 0.2s;
            font-weight: 600;
        }

        .currency-input:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .currency-select {
            padding: 14px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        .currency-select:focus {
            outline: none;
            border-color: #8b5cf6;
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        .currency-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .currency-item label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .swap-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
        }

        .swap-btn:hover {
            transform: rotate(180deg);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.35);
            width: 100%;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.45);
        }

        .result-area {
            margin-top: 20px;
            padding: 20px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 4px solid #10b981;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
            margin-bottom: 12px;
        }

        .result-rate {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .copy-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .copy-btn:hover {
            background: var(--border);
        }

        .rate-hint {
            padding: 14px;
            background: rgba(139, 92, 246, 0.08);
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--text-secondary);
            border-left: 4px solid #8b5cf6;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .currency-body {
                padding: 20px;
            }

            .convert-row {
                grid-template-columns: 1fr;
            }

            .swap-btn {
                width: 100%;
                height: 50px;
                border-radius: 12px;
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: rotate(270deg);
            }

            .conversion-block {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="currency-container">
                <div class="currency-header">
                    <h2><i class="fas fa-coins"></i> 汇率换算工具</h2>
                    <p>实时汇率换算，支持多种货币</p>
                </div>

                <div class="currency-body">
                    <div class="rate-hint">
                        <i class="fas fa-info-circle" style="color: #8b5cf6; margin-right: 8px;"></i>
                        💡 如果网络连接正常，您将看到实时汇率；如果离线，则使用离线前保存的参考汇率。
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-exchange-alt"></i> 货币兑换
                        </div>
                        
                        <div class="convert-row">
                            <div class="currency-item">
                                <label>源货币</label>
                                <input type="number" id="amount" class="currency-input" value="1" min="0" step="0.01">
                                <select id="fromCurrency" class="currency-select"></select>
                            </div>
                            
                            <button class="swap-btn" onclick="swapCurrencies()" title="互换货币">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            
                            <div class="currency-item">
                                <label>目标货币</label>
                                <input type="number" id="targetAmount" class="currency-input" readonly placeholder="---">
                                <select id="toCurrency" class="currency-select"></select>
                            </div>
                        </div>

                        <button class="action-btn" onclick="convertCurrency()">
                            <i class="fas fa-calculator"></i> 开始换算
                        </button>

                        <div id="currencyResult" class="result-area" style="display: none;">
                            <div class="result-label">换算结果</div>
                            <div class="result-value" id="resultValue"></div>
                            <div class="result-rate" id="rateInfo"></div>
                            <button class="copy-btn" onclick="copyResult()">
                                <i class="fas fa-copy"></i> 复制结果
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/currency.js"></script>
</body>
</html>
