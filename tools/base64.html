<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64编解码 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2><i class="fas fa-key"></i> Base64编解码工具</h2>
            <p class="description">文本与Base64编码之间的相互转换，支持图片转Base64</p>

            <div class="tool-container">
                <div class="toolbar">
                    <button onclick="encodeText()">编码</button>
                    <button onclick="decodeText()">解码</button>
                    <button onclick="copyResult()">复制结果</button>
                    <button onclick="clearAll()" class="secondary">清空</button>
                </div>
                <div class="panels">
                    <textarea id="input" placeholder="输入文本或粘贴Base64编码..."></textarea>
                    <textarea id="output" readonly placeholder="结果..."></textarea>
                </div>
            </div>

            <div class="tool-container" style="margin-top: 20px;">
                <h3><i class="fas fa-image"></i> 图片转Base64</h3>
                <div class="photo-upload">
                    <input type="file" id="imageUpload" accept="image/*" onchange="handleImageUpload(event)">
                    <label for="imageUpload" class="upload-btn">📁 选择图片</label>
                </div>
                <div id="imagePreview" class="image-preview"></div>
                <button onclick="copyBase64Image()" id="copyImageBtn" disabled>复制Base64</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/base64.js"></script>
</body>
</html>
