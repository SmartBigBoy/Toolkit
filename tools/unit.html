    <meta property="og:site_name" content="TOOLKIT.SKIN 在线工具箱">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="单位换算 - 在线工具箱">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="unit-container">
                <div class="unit-header">
                    <h2><i class="fas fa-ruler"></i> 单位换算工具</h2>
                    <p>常用单位之间的相互转换</p>
                </div>

                <div class="unit-body">
                    <div class="category-section">
                        <div class="category-label">
                            <i class="fas fa-th-large"></i> 选择换算类别
                        </div>
                        <select id="unitCategory" class="category-select" onchange="updateUnits()">
                            <option value="length">长度</option>
                            <option value="weight">重量</option>
                            <option value="temperature">温度</option>
                            <option value="pressure">压力</option>
                            <option value="volume">体积</option>
                            <option value="speed">速度</option>
                            <option value="time">时间</option>
                            <option value="power">功率</option>
                        </select>
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-exchange-alt"></i> 单位转换
                        </div>
                        
                        <div class="convert-row">
                            <div class="unit-item">
                                <label>源单位</label>
                                <input type="number" id="inputValue" class="unit-input" value="1" min="0" step="any">
                                <select id="fromUnit" class="unit-select"></select>
                            </div>
                            
                            <button class="swap-btn" onclick="swapUnits()" title="互换单位">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            
                            <div class="unit-item">
                                <label>目标单位</label>
                                <input type="number" id="targetValue" class="unit-input" readonly placeholder="---">
                                <select id="toUnit" class="unit-select"></select>
                            </div>
                        </div>

                        <button class="action-btn" onclick="convertUnit()">
                            <i class="fas fa-calculator"></i> 开始转换
                        </button>

                        <div id="unitResult" class="result-area" style="display: none;">
                            <div class="result-label">换算结果</div>
                            <div class="result-value" id="resultValue"></div>
                            <button class="copy-btn" onclick="copyResult()">
                                <i class="fas fa-copy"></i> 复制结果
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/unit.js"></script>
