<head>
    <meta charset="UTF-8">

    <meta name="keywords" content="在线工具,JSON格式化,时间戳转换,Base64编码,二维码生成,颜色转换,URL编码,工具箱">

    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/convert.html">
    <meta property="og:title" content="进制转换 - 在线工具箱">
    <meta property="og:description" content="免费在线工具箱，提供多种实用工具，包括JSON格式化、时间戳转换、Base64编码等。">

<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="convert-container">
                <div class="convert-header">
                    <h2><i class="fas fa-calculator"></i> 进制转换工具</h2>
                    <p>二进制、八进制、十进制、十六进制之间的相互转换</p>
                </div>

                <div class="convert-body">
                    <div class="input-section">
                        <div class="input-row">
                            <div class="input-item">
                                <label>输入值</label>
                                <input type="text" id="inputValue" class="convert-input" placeholder="输入数字">
                                <select id="fromBase" class="convert-select">
                                    <option value="2">二进制</option>
                                    <option value="8">八进制</option>
                                    <option value="10" selected>十进制</option>
                                    <option value="16">十六进制</option>
                                </select>
                            </div>
                            
                            <button class="swap-btn" onclick="swapBases()" title="互换进制">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            
                            <div class="input-item">
                                <label>目标进制</label>
                                <select id="toBase" class="convert-select">
                                    <option value="2">二进制</option>
                                    <option value="8">八进制</option>
                                    <option value="10">十进制</option>
                                    <option value="16" selected>十六进制</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button class="action-btn" onclick="convertBase()">
                        <i class="fas fa-magic"></i> 开始转换
                    </button>

                    <div class="results-grid">
                        <div class="result-card">
                            <span class="result-label">二进制</span>
                            <span class="result-value" id="binaryResult">---</span>
                            <button class="copy-btn" onclick="copyResult('binaryResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">八进制</span>
                            <span class="result-value" id="octalResult">---</span>
                            <button class="copy-btn" onclick="copyResult('octalResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">十进制</span>
                            <span class="result-value" id="decimalResult">---</span>
                            <button class="copy-btn" onclick="copyResult('decimalResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">十六进制</span>
                            <span class="result-value" id="hexResult">---</span>
                            <button class="copy-btn" onclick="copyResult('hexResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/convert.js"></script>
</body>
</html>
