    <script>
        function convertBase() {
            const input = document.getElementById('inputValue').value.trim();
            const toBase = parseInt(document.getElementById('toBase').value);
            if (!input) return;
            try {
                const decimal = parseInt(input, toBase);
                if (isNaN(decimal)) throw new Error('Invalid input');
                document.getElementById('binaryResult').textContent = decimal.toString(2);
                document.getElementById('octalResult').textContent = decimal.toString(8);
                document.getElementById('decimalResult').textContent = decimal.toString(10);
                document.getElementById('hexResult').textContent = decimal.toString(16).toUpperCase();
            } catch (e) {
                alert('请输入有效的数字');
            }
        }
        function swapBases() {
            const select = document.getElementById('toBase');
            const options = select.options;
            const currentIndex = select.selectedIndex;
            const nextIndex = (currentIndex + 1) % options.length;
            select.selectedIndex = nextIndex;
        }
        function copyResult(id) {
            const text = document.getElementById(id).textContent;
            if (text && text !== '---') {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('已复制到剪贴板');
                });
            }
        }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
