<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色转换 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .color-container {
            max-width: 650px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .color-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            text-align: center;
        }

        .color-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .color-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .color-body {
            padding: 32px;
        }

        .picker-section {
            margin-bottom: 28px;
        }

        .input-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .picker-area {
            text-align: center;
            padding: 24px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border: 2px dashed var(--border);
        }

        .picker-area input[type="color"] {
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: none;
        }

        .picker-area input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 4px;
        }

        .picker-area input[type="color"]::-webkit-color-swatch {
            border-radius: 8px;
            border: 2px solid var(--border);
        }

        .format-section {
            margin-bottom: 28px;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .format-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .format-item label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .format-item input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg-primary);
            transition: all 0.2s;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
        }

        .format-item input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--bg-secondary);
        }

        .preview-section {
            margin-bottom: 28px;
        }

        .color-preview {
            height: 180px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 4px solid var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .actions-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .action-btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .action-btn:hover {
            background: var(--border);
            transform: translateY(-2px);
        }

        .action-btn:active {
            transform: translateY(0);
        }

        @media (max-width: 600px) {
            .color-body {
                padding: 20px;
            }

            .format-grid {
                grid-template-columns: 1fr;
            }

            .actions-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="color-container">
                <div class="color-header">
                    <h2><i class="fas fa-palette"></i> 颜色转换工具</h2>
                    <p>颜色格式之间的相互转换，支持HEX、RGB、HSL</p>
                </div>

                <div class="color-body">
                    <div class="picker-section">
                        <div class="input-title">
                            <i class="fas fa-eyedropper"></i> 选择颜色
                        </div>
                        <div class="picker-area">
                            <input type="color" id="colorPicker" value="#3B82F6" oninput="updateFromPicker()">
                        </div>
                    </div>

                    <div class="format-section">
                        <div class="input-title">
                            <i class="fas fa-code"></i> 格式转换
                        </div>
                        <div class="format-grid">
                            <div class="format-item">
                                <label>HEX</label>
                                <input type="text" id="hexInput" placeholder="#3B82F6" oninput="convertFromHex()">
                            </div>
                            <div class="format-item">
                                <label>RGB</label>
                                <input type="text" id="rgbInput" placeholder="rgb(59, 130, 246)" oninput="convertFromRgb()">
                            </div>
                            <div class="format-item">
                                <label>HSL</label>
                                <input type="text" id="hslInput" placeholder="hsl(217, 91%, 60%)" oninput="convertFromHsl()">
                            </div>
                        </div>
                    </div>

                    <div class="preview-section">
                        <div class="input-title">
                            <i class="fas fa-eye"></i> 颜色预览
                        </div>
                        <div class="color-preview" id="colorPreview"></div>
                    </div>

                    <div class="actions-section">
                        <button class="action-btn" onclick="copyHex()">
                            <i class="fas fa-copy"></i> 复制HEX
                        </button>
                        <button class="action-btn" onclick="copyRgb()">
                            <i class="fas fa-copy"></i> 复制RGB
                        </button>
                        <button class="action-btn" onclick="copyHsl()">
                            <i class="fas fa-copy"></i> 复制HSL
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/color.js"></script>
</body>
</html>
