<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颜色转换 - 在线工具箱</title>
    <meta name="description" content="在线工具箱提供 JSON格式化、时间戳转换、Base64编码、颜色拾取器、二维码生成等实用工具，无需注册，完全免费。">
    <meta name="keywords" content="在线工具,JSON格式化,时间戳转换,Base64编码,二维码生成,颜色转换,URL编码,工具箱">
    <meta name="author" content="TOOLKIT.SKIN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/color.html">
    <meta property="og:title" content="颜色转换 - 在线工具箱">
    <meta property="og:description" content="免费在线工具箱，提供多种实用工具，包括JSON格式化、时间戳转换、Base64编码等。">
    <meta property="og:url" content="https://toolkit.skin/tools/color.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TOOLKIT.SKIN 在线工具箱">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="颜色转换 - 在线工具箱">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6560822080596473" crossorigin="anonymous"></script>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="color-container">
                <div class="color-header">
                    <h2><i class="fas fa-palette"></i> 颜色转换工具</h2>
                    <p>颜色格式之间的相互转换，支持HEX、RGB、HSL</p>
                </div>

                <div class="color-body">
                    <div class="picker-section">
                        <div class="input-title">
                            <i class="fas fa-eyedropper"></i> 选择颜色
                        </div>
                        <div class="picker-area">
                            <input type="color" id="colorPicker" value="#3B82F6" oninput="updateFromPicker()">
                        </div>
                    </div>

                    <div class="format-section">
                        <div class="input-title">
                            <i class="fas fa-code"></i> 格式转换
                        </div>
                        <div class="format-grid">
                            <div class="format-item">
                                <label>HEX</label>
                                <input type="text" id="hexInput" placeholder="#3B82F6" oninput="convertFromHex()">
                            </div>
                            <div class="format-item">
                                <label>RGB</label>
                                <input type="text" id="rgbInput" placeholder="rgb(59, 130, 246)" oninput="convertFromRgb()">
                            </div>
                            <div class="format-item">
                                <label>HSL</label>
                                <input type="text" id="hslInput" placeholder="hsl(217, 91%, 60%)" oninput="convertFromHsl()">
                            </div>
                        </div>
                    </div>

                    <div class="preview-section">
                        <div class="input-title">
                            <i class="fas fa-eye"></i> 颜色预览
                        </div>
                        <div class="color-preview" id="colorPreview"></div>
                    </div>

                    <div class="actions-section">
                        <button class="action-btn" onclick="copyHex()">
                            <i class="fas fa-copy"></i> 复制HEX
                        </button>
                        <button class="action-btn" onclick="copyRgb()">
                            <i class="fas fa-copy"></i> 复制RGB
                        </button>
                        <button class="action-btn" onclick="copyHsl()">
                            <i class="fas fa-copy"></i> 复制HSL
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/color.js"></script>
</body>
</html>
