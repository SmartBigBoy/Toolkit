<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码生成器 - 在线工具箱</title>
    <meta name="description" content="在线工具箱提供 JSON格式化、时间戳转换、Base64编码、颜色拾取器、二维码生成等实用工具，无需注册，完全免费。">
    <meta name="keywords" content="在线工具,JSON格式化,时间戳转换,Base64编码,二维码生成,颜色转换,URL编码,工具箱">
    <meta name="author" content="TOOLKIT.SKIN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/qrcode.html">
    <meta property="og:title" content="二维码生成器 - 在线工具箱">
    <meta property="og:description" content="免费在线工具箱，提供多种实用工具，包括JSON格式化、时间戳转换、Base64编码等。">
    <meta property="og:url" content="https://toolkit.skin/tools/qrcode.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TOOLKIT.SKIN 在线工具箱">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="二维码生成器 - 在线工具箱">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6560822080596473" crossorigin="anonymous"></script>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="qr-container">
                <div class="qr-header">
                    <h2><i class="fas fa-qrcode"></i> 二维码生成器</h2>
                    <p>将文本或URL转换为二维码，支持自定义颜色和大小</p>
                </div>

                <div class="qr-body">
                    <div class="input-section">
                        <div class="input-title">
                            <i class="fas fa-keyboard"></i> 输入内容
                        </div>
                        <div class="input-area">
                            <textarea id="qrInput" placeholder="输入文本、URL、联系方式等内容..." onkeydown="if(event.keyCode==13&&event.preventDefault();"></textarea>
                        </div>
                    </div>

                    <div class="config-section">
                        <div class="input-title">
                            <i class="fas fa-sliders-h"></i> 自定义配置
                        </div>
                        <div class="config-grid">
                            <div class="config-item">
                                <label>大小（像素）</label>
                                <select id="qrSize">
                                    <option value="150">150×150</option>
                                    <option value="200" selected>200×200</option>
                                    <option value="250">250×250</option>
                                    <option value="300">300×300</option>
                                    <option value="350">350×350</option>
                                </select>
                            </div>
                            <div class="config-item">
                                <label>前景色</label>
                                <input type="color" id="colorDark" value="#000000">
                            </div>
                            <div class="config-item">
                                <label>背景色</label>
                                <input type="color" id="colorLight" value="#ffffff">
                            </div>
                            <div class="config-item">
                                <label>纠错等级</label>
                                <select id="errorLevel">
                                    <option value="L" selected>L (7%)</option>
                                    <option value="M">M (15%)</option>
                                    <option value="Q">Q (25%)</option>
                                    <option value="H">H (30%)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="preview-section">
                        <div class="input-title">
                            <i class="fas fa-eye"></i> 二维码预览
                        </div>
                        <div id="qrResult" class="qr-preview">
                            <div style="color: var(--text-tertiary);">
                                <i class="fas fa-qrcode" style="font-size: 64px; margin-bottom: 16px; opacity: 0.3;"></i>
                                <p>输入内容后点击生成按钮</p>
                            </div>
                        </div>
                    </div>

                    <div class="actions-section">
                        <button class="action-btn primary" onclick="generateQRCode()">
                            <i class="fas fa-magic"></i> 生成二维码
                        </button>
                        <button class="action-btn secondary" onclick="downloadQRCode('png')" id="downloadPngBtn" disabled>
                            <i class="fas fa-download"></i> 下载PNG
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/qrcode.js"></script>
</body>
</html>
