    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script>
        let qrInstance = null;
        
        function generateQR() {
            const text = document.getElementById('qrInput').value.trim();
            if (!text) {
                alert('请输入内容');
                return;
            }
            
            const size = parseInt(document.getElementById('qrSize').value);
            const colorDark = document.getElementById('colorDark').value;
            const colorLight = document.getElementById('colorLight').value;
            const errorLevel = document.getElementById('errorLevel').value;
            
            document.getElementById('previewPlaceholder').style.display = 'none';
            document.getElementById('qrResult').style.display = 'block';
            document.getElementById('qrResult').innerHTML = '';
            
            qrInstance = new QRCode(document.getElementById('qrResult'), {
                text: text,
                width: size,
                height: size,
                colorDark: colorDark,
                colorLight: colorLight,
                correctLevel: QRCode.CorrectLevel[errorLevel]
            });
        }
        
        function downloadQR() {
            const img = document.querySelector('#qrResult img');
            if (img) {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = img.src;
                link.click();
            }
        }
    </script>
