<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON格式化 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2><i class="fas fa-file-code"></i> JSON格式化工具</h2>
            <p class="description">格式化或压缩JSON数据，支持语法错误检测</p>

            <div class="tool-container">
                <div class="toolbar">
                    <button onclick="formatJSON()">格式化</button>
                    <button onclick="compressJSON()">压缩</button>
                    <button onclick="copyResult()">复制结果</button>
                    <button onclick="clearAll()" class="secondary">清空</button>
                </div>
                <div class="panels">
                    <textarea id="input" placeholder="粘贴JSON内容..."></textarea>
                    <textarea id="output" readonly placeholder="格式化结果..."></textarea>
                </div>
                <div id="errorMsg" class="error hidden"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/json.js"></script>
</body>
</html>
