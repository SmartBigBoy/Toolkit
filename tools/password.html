<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .password-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .password-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            text-align: center;
        }

        .password-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .password-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .password-body {
            padding: 32px;
        }

        .config-section {
            margin-bottom: 24px;
        }

        .config-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .length-config {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .length-value {
            font-size: 18px;
            font-weight: 700;
            color: #10b981;
            text-align: center;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
        }

        .range-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: var(--bg-tertiary);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(16, 185, 129, 0.35);
            transition: all 0.2s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.45);
        }

        .checkbox-section {
            margin-bottom: 24px;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .checkbox-item {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 2px solid var(--border);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .checkbox-item:hover {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .checkbox-item input {
            width: 20px;
            height: 20px;
            accent-color: #10b981;
            cursor: pointer;
        }

        .checkbox-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
            width: 100%;
            margin-bottom: 24px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45);
        }

        .result-section {
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border);
            border-left: 4px solid #10b981;
        }

        .result-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
            margin-bottom: 16px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .copy-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .copy-btn:hover:not(:disabled) {
            background: var(--border);
        }

        @media (max-width: 768px) {
            .password-body {
                padding: 20px;
            }

            .checkbox-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="password-container">
                <div class="password-header">
                    <h2><i class="fas fa-lock"></i> 密码生成器</h2>
                    <p>生成安全的随机密码</p>
                </div>

                <div class="password-body">
                    <div class="config-section">
                        <div class="config-label">
                            <i class="fas fa-ruler-combined"></i> 密码长度
                        </div>
                        <div class="length-config">
                            <div class="length-value" id="lengthValue">16</div>
                            <input type="range" id="passwordLength" class="range-slider" value="16" min="4" max="128" oninput="updateLengthDisplay()">
                        </div>
                    </div>

                    <div class="checkbox-section">
                        <div class="config-label">
                            <i class="fas fa-cog"></i> 包含字符类型
                        </div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeUppercase" checked>
                                <span class="checkbox-text">大写字母 (A-Z)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeLowercase" checked>
                                <span class="checkbox-text">小写字母 (a-z)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeNumbers" checked>
                                <span class="checkbox-text">数字 (0-9)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeSymbols">
                                <span class="checkbox-text">特殊字符 (!@#$%)</span>
                            </label>
                        </div>
                    </div>

                    <button class="action-btn" onclick="generatePassword()">
                        <i class="fas fa-magic"></i> 生成密码
                    </button>

                    <div class="result-section">
                        <div class="result-label">生成的密码</div>
                        <div class="result-value" id="passwordResult">---</div>
                        <button class="copy-btn" onclick="copyPassword()" id="copyPasswordBtn" disabled>
                            <i class="fas fa-copy"></i> 复制密码
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/password.js"></script>
</body>
</html>
