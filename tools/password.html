<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密码生成器 - 在线工具箱</title>
    <meta name="description" content="在线工具箱提供 JSON格式化、时间戳转换、Base64编码、颜色拾取器、二维码生成等实用工具，无需注册，完全免费。">
    <meta name="keywords" content="在线工具,JSON格式化,时间戳转换,Base64编码,二维码生成,颜色转换,URL编码,工具箱">
    <meta name="author" content="TOOLKIT.SKIN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/password.html">
    <meta property="og:title" content="密码生成器 - 在线工具箱">
    <meta property="og:description" content="免费在线工具箱，提供多种实用工具，包括JSON格式化、时间戳转换、Base64编码等。">
    <meta property="og:url" content="https://toolkit.skin/tools/password.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TOOLKIT.SKIN 在线工具箱">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="密码生成器 - 在线工具箱">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6560822080596473" crossorigin="anonymous"></script>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="password-container">
                <div class="password-header">
                    <h2><i class="fas fa-lock"></i> 密码生成器</h2>
                    <p>生成安全的随机密码</p>
                </div>

                <div class="password-body">
                    <div class="config-section">
                        <div class="config-label">
                            <i class="fas fa-ruler-combined"></i> 密码长度
                        </div>
                        <div class="length-config">
                            <div class="length-value" id="lengthValue">16</div>
                            <input type="range" id="passwordLength" class="range-slider" value="16" min="4" max="128" oninput="updateLengthDisplay()">
                        </div>
                    </div>

                    <div class="checkbox-section">
                        <div class="config-label">
                            <i class="fas fa-cog"></i> 包含字符类型
                        </div>
                        <div class="checkbox-grid">
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeUppercase" checked>
                                <span class="checkbox-text">大写字母 (A-Z)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeLowercase" checked>
                                <span class="checkbox-text">小写字母 (a-z)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeNumbers" checked>
                                <span class="checkbox-text">数字 (0-9)</span>
                            </label>
                            <label class="checkbox-item">
                                <input type="checkbox" id="includeSymbols">
                                <span class="checkbox-text">特殊字符 (!@#$%)</span>
                            </label>
                        </div>
                    </div>

                    <button class="action-btn" onclick="generatePassword()">
                        <i class="fas fa-magic"></i> 生成密码
                    </button>

                    <div class="result-section">
                        <div class="result-label">生成的密码</div>
                        <div class="result-value" id="passwordResult">---</div>
                        <button class="copy-btn" onclick="copyPassword()" id="copyPasswordBtn" disabled>
                            <i class="fas fa-copy"></i> 复制密码
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/password.js"></script>
</body>
</html>
