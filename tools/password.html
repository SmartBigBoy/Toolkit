        .slider::-webkit-slider-thumb {

        .checkbox-item .checkmark {

<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container-box">
            <div class="color-header">
                <h1><i class="fas fa-lock"></i> 密码生成器</h1>
                <p>生成安全的随机密码</p>
            </div>
            
            <div class="color-body">
                <div class="config-card">
                    <div class="card-title">
                        <i class="fas fa-ruler-combined"></i>
                        <span>密码长度</span>
                    </div>
                    <div class="slider-row">
                        <span class="slider-value" id="lengthDisplay">16</span>
                        <input type="range" class="slider" id="passwordLength" value="16" min="4" max="64" oninput="updateLength()">
                    </div>
                </div>
                
                <div class="config-card">
                    <div class="card-title">
                        <i class="fas fa-cog"></i>
                        <span>包含字符类型</span>
                    </div>
                    <div class="checkbox-grid">
                        <label class="checkbox-item checked" onclick="toggleCheck(this)">
                            <input type="checkbox" id="includeUppercase" checked>
                            <span class="checkmark"></span>
                            <span>大写字母 (A-Z)</span>
                        </label>
                        <label class="checkbox-item checked" onclick="toggleCheck(this)">
                            <input type="checkbox" id="includeLowercase" checked>
                            <span class="checkmark"></span>
                            <span>小写字母 (a-z)</span>
                        </label>
                        <label class="checkbox-item checked" onclick="toggleCheck(this)">
                            <input type="checkbox" id="includeNumbers" checked>
                            <span class="checkmark"></span>
                            <span>数字 (0-9)</span>
                        </label>
                        <label class="checkbox-item" onclick="toggleCheck(this)">
                            <input type="checkbox" id="includeSymbols">
                            <span class="checkmark"></span>
                            <span>特殊字符 (!@#$%)</span>
                        </label>
                    </div>
                </div>
                
                <button class="generate-btn" onclick="generatePassword()">
                    <i class="fas fa-pen"></i>
                    <span>生成密码</span>
                </button>
                
                <div class="result-card">
                    <div class="label">生成的密码</div>
                    <div class="value" id="passwordResult">---</div>
                    <button class="copy-btn" onclick="copyPassword()">
                        <i class="fas fa-copy"></i> 复制密码
                    </button>
                </div>
            </div>
            
            <div class="footer-link">

            </div>
        </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script>
        function updateLength() {
            document.getElementById('lengthDisplay').textContent = document.getElementById('passwordLength').value;
        }
        
        function toggleCheck(el) {
            const input = el.querySelector('input[type="checkbox"]');
            input.checked = !input.checked;
            el.classList.toggle('checked', input.checked);
        }
        
        function generatePassword() {
            const length = parseInt(document.getElementById('passwordLength').value);
            
            const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const lowercase = 'abcdefghijklmnopqrstuvwxyz';
            const numbers = '0123456789';
            const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
            
            let useUpper = document.getElementById('includeUppercase').checked;
            let useLower = document.getElementById('includeLowercase').checked;
            let useNumbers = document.getElementById('includeNumbers').checked;
            let useSymbols = document.getElementById('includeSymbols').checked;
            
            // 如果什么都没选，默认使用所有类型
            if (!useUpper && !useLower && !useNumbers && !useSymbols) {
                useUpper = useLower = useNumbers = useSymbols = true;
            }
            
            // 构建密码，确保每种选中的类型至少有一个字符
            let password = '';
            let allChars = '';
            
            if (useUpper) { allChars += uppercase; password += uppercase[Math.floor(Math.random() * uppercase.length)]; }
            if (useLower) { allChars += lowercase; password += lowercase[Math.floor(Math.random() * lowercase.length)]; }
            if (useNumbers) { allChars += numbers; password += numbers[Math.floor(Math.random() * numbers.length)]; }
            if (useSymbols) { allChars += symbols; password += symbols[Math.floor(Math.random() * symbols.length)]; }
            
            // 填充剩余长度
            for (let i = password.length; i < length; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }
            
            // 打乱密码顺序
            password = password.split('').sort(() => Math.random() - 0.5).join('');
            
            document.getElementById('passwordResult').textContent = password;
        }
        
        function copyPassword() {
            const pwd = document.getElementById('passwordResult').textContent;
            if (pwd && pwd !== '---') {
                navigator.clipboard.writeText(pwd).then(() => showToast('已复制到剪贴板'));
            }
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
        
        // 初始化复选框状态
        function initCheckboxes() {
            document.querySelectorAll('.checkbox-item').forEach(item => {
                const input = item.querySelector('input[type="checkbox"]');
                item.classList.toggle('checked', input.checked);
                item.onclick = function() { toggleCheck(this); };
            });
        }
        
        generatePassword();
        initCheckboxes();
    </script>
