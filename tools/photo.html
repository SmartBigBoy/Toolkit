<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container-box">
            <div class="color-header">
                <h1><i class="fas fa-camera"></i> 证件照转换工具</h1>
                <p>上传证件照并转换为指定尺寸</p>
            </div>
            
            <div class="color-body">
                <div class="upload-box" onclick="document.getElementById('photoUpload').click()">
                    <input type="file" id="photoUpload" accept="image/*" onchange="handlePhotoUpload(event)" style="display:none;">
                    <div class="upload-icon"><i class="fas fa-cloud-upload-alt"></i></div>
                    <div class="upload-text">点击或拖拽上传照片</div>
                    <div class="upload-hint">支持JPG、PNG格式，建议分辨率不低于300dpi</div>
                    <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('photoUpload').click()">选择照片</button>
                </div>
                
                <div class="preview-box">
                    <div class="card-title">
                        <i class="fas fa-eye"></i>
                        <span>照片预览</span>
                    </div>
                    <div class="preview-image" id="photoPreview">
                        暂无照片
                    </div>
                </div>
                
                <div class="preview-box">
                    <div class="card-title">
                        <i class="fas fa-pen"></i>
                        <span>选择目标尺寸</span>
                    </div>
                    <div class="size-grid">
                        <div class="size-card selected" data-size="1inch" onclick="selectSize(this)">
                            <div class="size-name">一寸照片</div>
                            <div class="size-info">25×35mm<br>295×413px</div>
                        </div>
                        <div class="size-card" data-size="small1inch" onclick="selectSize(this)">
                            <div class="size-name">小一寸</div>
                            <div class="size-info">22×32mm<br>260×378px</div>
                        </div>
                        <div class="size-card" data-size="large1inch" onclick="selectSize(this)">
                            <div class="size-name">大一寸</div>
                            <div class="size-info">33×48mm<br>390×567px</div>
                        </div>
                        <div class="size-card" data-size="2inch" onclick="selectSize(this)">
                            <div class="size-name">二寸照片</div>
                            <div class="size-info">35×49mm<br>413×579px</div>
                        </div>
                        <div class="size-card" data-size="small2inch" onclick="selectSize(this)">
                            <div class="size-name">小二寸</div>
                            <div class="size-info">33×48mm<br>390×567px</div>
                        </div>
                        <div class="size-card" data-size="idcard" onclick="selectSize(this)">
                            <div class="size-name">身份证</div>
                            <div class="size-info">26×32mm<br>358×441px</div>
                        </div>
                        <div class="size-card" data-size="passport" onclick="selectSize(this)">
                            <div class="size-name">护照/签证</div>
                            <div class="size-info">33×48mm<br>390×567px</div>
                        </div>
                    </div>
                </div>
                
                <div class="btn-row">
                    <button class="btn-primary" id="convertBtn" onclick="convertPhoto()">
                        <i class="fas fa-magic"></i>
                        <span>转换照片</span>
                    </button>
                    <button class="btn-secondary" id="downloadBtn" onclick="downloadPhoto()">
                        <i class="fas fa-download"></i>
                        <span>下载照片</span>
                    </button>

    <script>
        function selectSize(el) {
            document.querySelectorAll('.size-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
        }
    </script>
