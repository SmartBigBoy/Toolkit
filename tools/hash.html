    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        function calculateHash() {
            const text = document.getElementById('inputText').value;
            if (!text) return;
            document.getElementById('md5Result').textContent = CryptoJS.MD5(text).toString();
            document.getElementById('sha1Result').textContent = CryptoJS.SHA1(text).toString();
            document.getElementById('sha256Result').textContent = CryptoJS.SHA256(text).toString();
        }
        function handleFile(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                document.getElementById('inputText').value = '[文件: ' + file.name + ']';
                document.getElementById('md5Result').textContent = CryptoJS.MD5(text).toString();
                document.getElementById('sha1Result').textContent = CryptoJS.SHA1(text).toString();
                document.getElementById('sha256Result').textContent = CryptoJS.SHA256(text).toString();
            };
            reader.readAsText(file);
        }
        function copyResult(id) {
            const text = document.getElementById(id).textContent;
            if (text && text !== '---') {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('已复制到剪贴板');
                });
            }
        }
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
