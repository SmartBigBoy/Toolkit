    <script>
        function pad(n) { return n.toString().padStart(2, '0'); }
        
        function initCurrentTime() {
            const now = new Date();
            const seconds = Math.floor(now.getTime() / 1000);
            document.getElementById('currentSeconds').textContent = seconds;
            document.getElementById('currentMillis').textContent = now.getTime();
            
            // 初始化日期输入框为当前时间
            document.getElementById('year').value = now.getFullYear();
            document.getElementById('month').value = pad(now.getMonth() + 1);
            document.getElementById('day').value = pad(now.getDate());
            document.getElementById('hour').value = pad(now.getHours());
            document.getElementById('minute').value = pad(now.getMinutes());
            document.getElementById('second').value = pad(now.getSeconds());
        }
        
        // 只刷新时间戳数字，不刷新日期输入框
        function updateTimestampOnly() {
            const now = new Date();
            document.getElementById('currentSeconds').textContent = Math.floor(now.getTime() / 1000);
            document.getElementById('currentMillis').textContent = now.getTime();
        }
        
        initCurrentTime();
        setInterval(updateTimestampOnly, 1000);
        
        function timestampToDate() {
            const input = document.getElementById('timestampInput').value.trim();
            if (!input) return;
            let ts = parseInt(input);
            if (ts < 10000000000) ts *= 1000;
            const date = new Date(ts);
            document.getElementById('dateResultValue').textContent = date.toLocaleString('zh-CN');
            document.getElementById('dateResult').style.display = 'block';
        }
        
        function dateToTimestamp() {
            const y = parseInt(document.getElementById('year').value) || 2025;
            const mo = parseInt(document.getElementById('month').value) || 1;
            const d = parseInt(document.getElementById('day').value) || 1;
            const h = parseInt(document.getElementById('hour').value) || 0;
            const mi = parseInt(document.getElementById('minute').value) || 0;
            const s = parseInt(document.getElementById('second').value) || 0;
            const date = new Date(y, mo - 1, d, h, mi, s);
            document.getElementById('timestampResultValue').textContent = date.getTime();
            document.getElementById('timestampResult').style.display = 'block';
        }
        
        function copyValue(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => showToast('已复制'));
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:9999;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }
    </script>
