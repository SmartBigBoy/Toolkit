<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学计算 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .math-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .math-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            text-align: center;
        }

        .math-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .math-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .math-body {
            padding: 32px;
        }

        .conversion-block {
            margin-bottom: 32px;
            padding: 24px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border-left: 4px solid #10b981;
        }

        .conversion-block:last-child {
            margin-bottom: 0;
        }

        .block-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-title i {
            color: #10b981;
        }

        .basic-calc-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            margin-bottom: 16px;
            align-items: center;
        }

        .basic-input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-secondary);
            text-align: center;
            transition: all 0.2s;
            font-weight: 600;
        }

        .basic-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .operator-select {
            padding: 14px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            background: var(--bg-secondary);
            cursor: pointer;
            text-align: center;
            width: 70px;
            transition: all 0.2s;
        }

        .operator-select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
            white-space: nowrap;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45);
        }

        .action-btn.full {
            width: 100%;
        }

        .action-btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .action-btn.secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .result-area {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 4px solid #10b981;
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
        }

        .trig-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .trig-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .trig-item label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .trig-input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-secondary);
            transition: all 0.2s;
        }

        .trig-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .trig-select {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .trig-select:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        .advanced-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .advanced-item {
            padding: 14px;
            background: var(--bg-secondary);
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .advanced-item .label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
        }

        .advanced-item .value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
        }

        .single-num-input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-secondary);
            width: 100%;
            margin-bottom: 16px;
            transition: all 0.2s;
        }

        .single-num-input:focus {
            outline: none;
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }

        @media (max-width: 768px) {
            .math-body {
                padding: 20px;
            }

            .basic-calc-row {
                grid-template-columns: 1fr;
            }

            .operator-select {
                width: 100%;
            }

            .trig-row {
                grid-template-columns: 1fr;
            }

            .advanced-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .conversion-block {
                padding: 16px;
            }
        }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V8533PXQLF"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-V8533PXQLF');
    </script>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="math-container">
                <div class="math-header">
                    <h2><i class="fas fa-square-root-alt"></i> 数学计算器</h2>
                    <p>常用数学计算工具</p>
                </div>

                <div class="math-body">
                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-calculator"></i> 基础四则运算
                        </div>
                        <div class="basic-calc-row">
                            <input type="number" id="num1" class="basic-input" value="10">
                            <select id="operation" class="operator-select">
                                <option value="add">+</option>
                                <option value="subtract">-</option>
                                <option value="multiply">×</option>
                                <option value="divide">÷</option>
                                <option value="pow">^</option>
                                <option value="mod">%</option>
                            </select>
                            <input type="number" id="num2" class="basic-input" value="5">
                        </div>
                        <button class="action-btn full" onclick="calculate()">
                            <i class="fas fa-equals"></i> 计算
                        </button>
                        <div id="basicResult" class="result-area" style="display: none;">
                            <div class="result-label">结果</div>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <div class="result-value" id="basicResultValue"></div>
                                <button class="action-btn secondary" onclick="copyBasicResult()" style="padding: 10px 16px; font-size: 14px; flex-shrink: 0;">
                                    <i class="fas fa-copy"></i> 复制
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-chart-line"></i> 三角函数
                        </div>
                        <div class="trig-row">
                            <div class="trig-item">
                                <label>角度（度）</label>
                                <input type="number" id="angle" class="trig-input" value="45">
                            </div>
                            <div class="trig-item">
                                <label>函数类型</label>
                                <select id="trigType" class="trig-select">
                                    <option value="sin">sin</option>
                                    <option value="cos">cos</option>
                                    <option value="tan">tan</option>
                                    <option value="asin">asin</option>
                                    <option value="acos">acos</option>
                                    <option value="atan">atan</option>
                                </select>
                            </div>
                        </div>
                        <button class="action-btn full" onclick="calculateTrig()">
                            <i class="fas fa-equals"></i> 计算
                        </button>
                        <div id="trigResult" class="result-area" style="display: none;">
                            <div class="result-label">结果</div>
                            <div style="display: flex; gap: 12px; align-items: center;">
                                <div class="result-value" id="trigResultValue"></div>
                                <button class="action-btn secondary" onclick="copyTrigResult()" style="padding: 10px 16px; font-size: 14px; flex-shrink: 0;">
                                    <i class="fas fa-copy"></i> 复制
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-cubes"></i> 函数计算
                        </div>
                        <input type="number" id="calcNum" class="single-num-input" value="16" placeholder="输入数字">
                        <button class="action-btn full" onclick="calculateAdvanced()">
                            <i class="fas fa-magic"></i> 全部计算
                        </button>
                        <div class="advanced-grid" style="margin-top: 16px;">
                            <div class="advanced-item">
                                <span class="label">平方根</span>
                                <span class="value" id="sqrtResult">---</span>
                            </div>
                            <div class="advanced-item">
                                <span class="label">立方根</span>
                                <span class="value" id="cbrtResult">---</span>
                            </div>
                            <div class="advanced-item">
                                <span class="label">绝对值</span>
                                <span class="value" id="absResult">---</span>
                            </div>
                            <div class="advanced-item">
                                <span class="label">自然对数</span>
                                <span class="value" id="logResult">---</span>
                            </div>
                            <div class="advanced-item">
                                <span class="label">常用对数</span>
                                <span class="value" id="log10Result">---</span>
                            </div>
                            <div class="advanced-item">
                                <span class="label">e的幂</span>
                                <span class="value" id="expResult">---</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>
