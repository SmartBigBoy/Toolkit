<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学计算 - TOOLKIT.SKIN</title>
    <meta name="description" content="在线数学计算器，支持基础运算、科学计数、函数计算等多种数学计算功能，无需注册，完全免费。">
    <meta name="keywords" content="在线计算器,数学计算,科学计算器,函数计算,在线工具">
    <meta name="author" content="TOOLKIT.SKIN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/math.html">
    <meta property="og:title" content="数学计算">
    <meta property="og:description" content="在线数学计算器，支持多种计算功能。">
    <meta property="og:url" content="https://toolkit.skin/tools/math.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6560822080596473" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page-wrapper {
            max-width: 400px;
            margin: 0 auto;
        }

        /* 顶部标题栏 */
        .header {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            border-radius: 24px 24px 0 0;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }

        .header h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 13px;
        }

        /* 主体卡片 */
        .main-card {
            background: #fff;
            border-radius: 0 0 24px 24px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        /* 显示区 */
        .display {
            background: #f8fafc;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border-left: 4px solid #8b5cf6;
        }

        .display-expression {
            font-size: 14px;
            color: #64748b;
            min-height: 20px;
            text-align: right;
            margin-bottom: 8px;
            word-break: break-all;
        }

        .display-result {
            font-size: 32px;
            font-weight: 700;
            color: #1e293b;
            text-align: right;
            word-break: break-all;
            min-height: 40px;
        }

        /* 按键区 */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .key {
            padding: 18px;
            font-size: 20px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .key:active {
            transform: scale(0.95);
        }

        .key-number {
            background: #f1f5f9;
            color: #1e293b;
        }

        .key-number:hover {
            background: #e2e8f0;
        }

        .key-operator {
            background: #f1f5f9;
            color: #8b5cf6;
        }

        .key-operator:hover {
            background: #e2e8f0;
        }

        .key-function {
            background: #f1f5f9;
            color: #64748b;
            font-size: 16px;
        }

        .key-function:hover {
            background: #e2e8f0;
        }

        .key-equals {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: #fff;
            grid-column: span 2;
        }

        .key-equals:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
        }

        .key-clear {
            background: #fee2e2;
            color: #ef4444;
        }

        .key-clear:hover {
            background: #fecaca;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #10b981;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            z-index: 9999;
            transition: transform 0.3s;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <!-- 顶部标题栏 -->
        <div class="header">
            <h1>数学计算</h1>
            <p>支持多种数学运算和函数</p>
        </div>

        <!-- 主体卡片 -->
        <div class="main-card">
            <!-- 显示区 -->
            <div class="display">
                <div class="display-expression" id="expression"></div>
                <div class="display-result" id="result">0</div>
            </div>

            <!-- 按键区 -->
            <div class="keypad">
                <button class="key key-clear" onclick="clearAll()">C</button>
                <button class="key key-function" onclick="backspace()">⌫</button>
                <button class="key key-function" onclick="input('%')">%</button>
                <button class="key key-operator" onclick="input('/')">÷</button>

                <button class="key key-number" onclick="input('7')">7</button>
                <button class="key key-number" onclick="input('8')">8</button>
                <button class="key key-number" onclick="input('9')">9</button>
                <button class="key key-operator" onclick="input('*')">×</button>

                <button class="key key-number" onclick="input('4')">4</button>
                <button class="key key-number" onclick="input('5')">5</button>
                <button class="key key-number" onclick="input('6')">6</button>
                <button class="key key-operator" onclick="input('-')">−</button>

                <button class="key key-number" onclick="input('1')">1</button>
                <button class="key key-number" onclick="input('2')">2</button>
                <button class="key key-number" onclick="input('3')">3</button>
                <button class="key key-operator" onclick="input('+')">+</button>

                <button class="key key-number" onclick="input('0')">0</button>
                <button class="key key-number" onclick="input('.')">.</button>
                <button class="key key-equals" onclick="calculate()">=</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        let expression = '';
        let lastResult = '';

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateDisplay() {
            document.getElementById('expression').textContent = expression;
        }

        function input(value) {
            // 如果刚计算完结果，用结果继续运算
            if (lastResult && ['+', '-', '*', '/', '%'].includes(value)) {
                expression = lastResult;
                lastResult = '';
            }
            expression += value;
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            lastResult = '';
            document.getElementById('expression').textContent = '';
            document.getElementById('result').textContent = '0';
        }

        function backspace() {
            expression = expression.slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            if (!expression) return;
            
            try {
                // 安全计算
                const result = Function('"use strict"; return (' + expression + ')')();
                
                if (isNaN(result) || !isFinite(result)) {
                    document.getElementById('result').textContent = 'Error';
                    return;
                }

                // 格式化结果
                let formatted;
                if (Number.isInteger(result)) {
                    formatted = result.toString();
                } else {
                    formatted = parseFloat(result.toFixed(10)).toString();
                }

                lastResult = formatted;
                document.getElementById('result').textContent = formatted;
                expression = '';
                updateDisplay();
            } catch (e) {
                document.getElementById('result').textContent = 'Error';
            }
        }

        // 键盘支持
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') input(e.key);
            else if (e.key === '.') input('.');
            else if (e.key === '+') input('+');
            else if (e.key === '-') input('-');
            else if (e.key === '*') input('*');
            else if (e.key === '/') input('/');
            else if (e.key === '%') input('%');
            else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            }
            else if (e.key === 'Backspace') backspace();
            else if (e.key === 'Escape') clearAll();
        });
    </script>
</body>
</html>
