<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学计算 - TOOLKIT.SKIN</title>
    <meta name="description" content="在线数学计算工具，支持基础四则运算、三角函数、平方根、绝对值等常用数学计算，无需注册，完全免费。">
    <meta name="keywords" content="数学计算,计算器,三角函数,平方根,在线工具">
    <meta name="author" content="TOOLKIT.SKIN">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://toolkit.skin/tools/math.html">
    <meta property="og:title" content="数学计算">
    <meta property="og:description" content="在线数学计算工具，支持基础四则运算、三角函数等。">
    <meta property="og:url" content="https://toolkit.skin/tools/math.html">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6560822080596473" crossorigin="anonymous"></script>
</head>
<body>

    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
            <div class="search-box">
                <input type="text" id="search" placeholder="搜索工具...">
                <i class="fas fa-search"></i>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="tool-container">
                <div class="color-header">
                    <div class="color-title">
                        <i class="fas fa-calculator"></i>
                        <h1>数学计算器</h1>
                    </div>
                    <p class="color-desc">常用数学计算工具，支持四则运算、三角函数、函数计算</p>
                </div>

                <div class="color-content">
                    <!-- 基础四则运算区块 -->
                    <div class="color-section">
                        <div class="section-title">
                            <i class="fas fa-plus-minus"></i>
                            <span>基础四则运算</span>
                        </div>
                        <div class="format-grid">
                            <div class="format-item">
                                <label>数值1</label>
                                <input type="number" id="num1" class="unit-input" value="10" placeholder="输入数字">
                            </div>
                            <div class="format-item">
                                <label>运算符</label>
                                <select id="operation" class="unit-select">
                                    <option value="add">+</option>
                                    <option value="subtract">-</option>
                                    <option value="multiply">×</option>
                                    <option value="divide">÷</option>
                                    <option value="pow">^</option>
                                    <option value="mod">%</option>
                                </select>
                            </div>
                            <div class="format-item">
                                <label>数值2</label>
                                <input type="number" id="num2" class="unit-input" value="5" placeholder="输入数字">
                            </div>
                        </div>
                        <button class="action-btn full" onclick="calculate()">
                            <i class="fas fa-equals"></i>
                            <span>计算</span>
                        </button>
                        <div id="basicResult" class="result-area" style="display: none;">
                            <div class="result-label">结果</div>
                            <div class="result-value" id="basicResultValue"></div>
                        </div>
                    </div>

                    <!-- 三角函数区块 -->
                    <div class="color-section">
                        <div class="section-title">
                            <i class="fas fa-chart-line"></i>
                            <span>三角函数</span>
                        </div>
                        <div class="format-grid">
                            <div class="format-item">
                                <label>角度（度）</label>
                                <input type="number" id="angle" class="unit-input" value="45" placeholder="输入角度">
                            </div>
                            <div class="format-item">
                                <label>函数类型</label>
                                <select id="trigType" class="unit-select">
                                    <option value="sin">sin</option>
                                    <option value="cos">cos</option>
                                    <option value="tan">tan</option>
                                    <option value="asin">asin</option>
                                    <option value="acos">acos</option>
                                    <option value="atan">atan</option>
                                </select>
                            </div>
                        </div>
                        <button class="action-btn full" onclick="calculateTrig()">
                            <i class="fas fa-equals"></i>
                            <span>计算</span>
                        </button>
                        <div id="trigResult" class="result-area" style="display: none;">
                            <div class="result-label">结果</div>
                            <div class="result-value" id="trigResultValue"></div>
                        </div>
                    </div>

                    <!-- 函数计算区块 -->
                    <div class="color-section">
                        <div class="section-title">
                            <i class="fas fa-magic"></i>
                            <span>函数计算</span>
                        </div>
                        <div class="color-picker-box" style="margin-bottom: 16px;">
                            <input type="number" id="calcNum" class="unit-input" value="16" placeholder="输入数字" style="width: 100%; text-align: center; font-size: 18px; padding: 16px;">
                        </div>
                        <button class="action-btn full" onclick="calculateAdvanced()">
                            <i class="fas fa-magic"></i>
                            <span>全部计算</span>
                        </button>
                        <div class="format-grid" style="margin-top: 16px;">
                            <div class="format-item">
                                <label>平方根</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="sqrtResult">---</div>
                            </div>
                            <div class="format-item">
                                <label>立方根</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="cbrtResult">---</div>
                            </div>
                            <div class="format-item">
                                <label>绝对值</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="absResult">---</div>
                            </div>
                            <div class="format-item">
                                <label>自然对数</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="logResult">---</div>
                            </div>
                            <div class="format-item">
                                <label>常用对数</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="log10Result">---</div>
                            </div>
                            <div class="format-item">
                                <label>e的幂</label>
                                <div class="unit-input" style="background: var(--bg-tertiary);" id="expResult">---</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p><a href="../index.html">首页</a> | <a href="../disclaimer.html">免责声明</a></p>
            <p>© 2025 TOOLKIT.SKIN | 简洁高效的工具集合</p>
        </div>
    </footer>

    <div class="toast" id="toast"></div>

    <script src="../js/tools/math.js"></script>
</body>
</html>
