<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间戳转换 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .timestamp-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .timestamp-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            text-align: center;
        }

        .timestamp-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .timestamp-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .timestamp-body {
            padding: 32px;
        }

        .conversion-block {
            margin-bottom: 32px;
            padding: 24px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            border-left: 4px solid var(--primary);
        }

        .conversion-block:last-child {
            margin-bottom: 0;
        }

        .block-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .block-title i {
            color: var(--primary);
        }

        .current-timestamp {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .timestamp-display {
            flex: 1;
            padding: 16px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            font-size: 16px;
            color: var(--text-primary);
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
            white-space: nowrap;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .action-btn.secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            box-shadow: none;
        }

        .action-btn.secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg-primary);
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--bg-secondary);
        }

        .datetime-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .datetime-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .datetime-item label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .datetime-item input {
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--bg-primary);
            transition: all 0.2s;
            text-align: center;
        }

        .datetime-item input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
            background: var(--bg-secondary);
        }

        .result-area {
            margin-top: 16px;
            padding: 16px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 4px solid var(--success);
        }

        .result-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .result-value {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
            white-space: pre-line;
            line-height: 1.6;
        }

        .convert-btn {
            width: 100%;
        }

        @media (max-width: 768px) {
            .timestamp-body {
                padding: 20px;
            }

            .datetime-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .current-timestamp {
                flex-direction: column;
            }

            .current-timestamp .timestamp-display {
                width: 100%;
            }

            .conversion-block {
                padding: 16px;
            }
        }

        @media (max-width: 480px) {
            .datetime-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="timestamp-container">
                <div class="timestamp-header">
                    <h2><i class="fas fa-clock"></i> 时间戳转换工具</h2>
                    <p>时间戳与日期时间之间的相互转换</p>
                </div>

                <div class="timestamp-body">
                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-bolt"></i> 当前时间戳
                        </div>
                        <div class="timestamp-display" style="margin-bottom: 16px;">
                            <div id="currentSeconds" style="margin-bottom: 8px;"></div>
                            <div id="currentMillis"></div>
                        </div>
                        <div class="current-timestamp" style="gap: 8px;">
                            <button class="action-btn secondary" onclick="copyCurrentSeconds()" style="flex: 1;">
                                <i class="fas fa-copy"></i> 复制秒
                            </button>
                            <button class="action-btn" onclick="copyCurrentMillis()" style="flex: 1;">
                                <i class="fas fa-copy"></i> 复制毫秒
                            </button>
                        </div>
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-arrow-right"></i> 时间戳 → 日期
                        </div>
                        <div class="input-group">
                            <label>输入时间戳（支持秒或毫秒）</label>
                            <input type="number" id="timestampInput" placeholder="例如：1699999999 或 1699999999000">
                        </div>
                        <button class="action-btn convert-btn" onclick="timestampToDate()">
                            <i class="fas fa-magic"></i> 转换为日期
                        </button>
                        <div id="dateResult" class="result-area" style="display: none;">
                            <div class="result-label">转换结果</div>
                            <div class="result-value" id="dateResultValue"></div>
                            <div style="margin-top: 12px; display: flex; gap: 8px;">
                                <button class="action-btn secondary" onclick="copyResult('dateResultValue')" style="flex: 1; padding: 10px; font-size: 13px;">
                                    <i class="fas fa-copy"></i> 复制结果
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="conversion-block">
                        <div class="block-title">
                            <i class="fas fa-arrow-left"></i> 日期 → 时间戳
                        </div>
                        <div class="datetime-grid">
                            <div class="datetime-item">
                                <label>年</label>
                                <input type="number" id="year" value="2025" min="1970" max="2100">
                            </div>
                            <div class="datetime-item">
                                <label>月</label>
                                <input type="number" id="month" value="1" min="1" max="12">
                            </div>
                            <div class="datetime-item">
                                <label>日</label>
                                <input type="number" id="day" value="1" min="1" max="31">
                            </div>
                            <div class="datetime-item">
                                <label>时</label>
                                <input type="number" id="hour" value="0" min="0" max="23">
                            </div>
                            <div class="datetime-item">
                                <label>分</label>
                                <input type="number" id="minute" value="0" min="0" max="59">
                            </div>
                            <div class="datetime-item">
                                <label>秒</label>
                                <input type="number" id="second" value="0" min="0" max="59">
                            </div>
                        </div>
                        <button class="action-btn convert-btn" onclick="dateToTimestamp()">
                             <i class="fas fa-magic"></i> 转换为时间戳
                         </button>
                         <div id="timestampResult" class="result-area" style="display: none;">
                              <div class="result-label">转换结果</div>
                              <div class="result-value">
<span id="secondsResult"></span><br>
<span id="millisResult"></span>
                              </div>
                              <div style="margin-top: 12px; display: flex; gap: 8px;">
                                  <button class="action-btn secondary" onclick="copyResult('secondsResult')" style="flex: 1; padding: 10px; font-size: 13px;">
                                      <i class="fas fa-copy"></i> 复制秒
                                  </button>
                                  <button class="action-btn secondary" onclick="copyResult('millisResult')" style="flex: 1; padding: 10px; font-size: 13px;">
                                      <i class="fas fa-copy"></i> 复制毫秒
                                  </button>
                              </div>
                          </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/timestamp.js"></script>
</body>
</html>
