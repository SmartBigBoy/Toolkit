<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本处理 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2><i class="fas fa-align-left"></i> 文本处理工具</h2>
            <p class="description">文本大小写转换、去空格、去重等操作</p>

            <div class="tool-container">
                <div class="toolbar">
                    <button onclick="toUpperCase()">转大写</button>
                    <button onclick="toLowerCase()">转小写</button>
                    <button onclick="toTitleCase()">首字母大写</button>
                    <button onclick="trimWhitespace()">去除空格</button>
                    <button onclick="removeDuplicateLines()">去重行</button>
                    <button onclick="reverseText()">反转文本</button>
                    <button onclick="copyResult()">复制结果</button>
                    <button onclick="clearAll()" class="secondary">清空</button>
                </div>
                <div class="panels">
                    <textarea id="input" placeholder="输入文本..."></textarea>
                    <textarea id="output" readonly placeholder="结果..."></textarea>
                </div>
                <div class="stats">
                    <span>字符数: <span id="charCount">0</span></span>
                    <span>字数: <span id="wordCount">0</span></span>
                    <span>行数: <span id="lineCount">0</span></span>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/text.js"></script>
</body>
</html>
