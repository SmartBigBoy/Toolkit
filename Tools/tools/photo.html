<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证件照转换 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .photo-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .photo-header {
            padding: 28px 32px;
            background: var(--primary-gradient);
            color: white;
            text-align: center;
        }

        .photo-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .photo-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .photo-body {
            padding: 32px;
        }

        .upload-section {
            margin-bottom: 28px;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 24px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: var(--bg-tertiary);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 16px;
        }

        .upload-text {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .upload-hint {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .upload-btn {
            display: inline-block;
            padding: 14px 32px;
            background: var(--primary-gradient);
            color: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
            margin-top: 16px;
            border: none;
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .preview-section {
            margin-bottom: 28px;
        }

        .preview-title {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .image-preview {
            padding: 24px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
        }

        .size-section {
            margin-bottom: 28px;
        }

        .size-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .size-option {
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            background: var(--bg-secondary);
        }

        .size-option:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .size-option.selected {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.1);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .size-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .size-dimensions {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .actions-section {
            display: flex;
            gap: 16px;
        }

        .action-btn {
            flex: 1;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn.primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.35);
        }

        .action-btn.primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.45);
        }

        .action-btn.secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .action-btn.secondary:hover:not(:disabled) {
            background: var(--border);
        }

        .action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .selected-size-info {
            padding: 16px;
            background: rgba(99, 102, 241, 0.08);
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
        }

        .selected-size-info p {
            margin: 0;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .selected-size-info strong {
            color: var(--primary);
        }

        @media (max-width: 600px) {
            .photo-body {
                padding: 20px;
            }

            .size-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .actions-section {
                flex-direction: column;
            }

            .upload-area {
                padding: 30px 16px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="photo-container">
                <div class="photo-header">
                    <h2><i class="fas fa-camera"></i> 证件照转换工具</h2>
                    <p>上传证件照并转换为指定尺寸</p>
                </div>

                <div class="photo-body">
                    <div class="upload-section">
                        <div class="upload-area" id="uploadArea">
                            <input type="file" id="photoUpload" accept="image/*" onchange="handlePhotoUpload(event)" style="display: none;">
                            <div class="upload-icon">📷</div>
                            <div class="upload-text">点击或拖拽上传照片</div>
                            <div class="upload-hint">支持 JPG、PNG 格式，建议分辨率不低于 300dpi</div>
                            <button class="upload-btn" onclick="document.getElementById('photoUpload').click()">选择照片</button>
                        </div>
                    </div>

                    <div class="preview-section">
                        <div class="preview-title">
                            <i class="fas fa-eye"></i> 照片预览
                        </div>
                        <div id="photoPreview" class="image-preview">
                            <div style="color: var(--text-tertiary);">暂无照片</div>
                        </div>
                    </div>

                    <div class="size-section">
                        <div class="preview-title">
                            <i class="fas fa-ruler"></i> 选择目标尺寸
                        </div>
                        
                        <div class="size-grid">
                            <div class="size-option" data-size="1inch">
                                <div class="size-name">一寸照片</div>
                                <div class="size-dimensions">25×35mm<br>295×413px</div>
                            </div>
                            <div class="size-option" data-size="small1inch">
                                <div class="size-name">小一寸</div>
                                <div class="size-dimensions">22×32mm<br>260×378px</div>
                            </div>
                            <div class="size-option" data-size="large1inch">
                                <div class="size-name">大一寸</div>
                                <div class="size-dimensions">33×48mm<br>390×567px</div>
                            </div>
                            <div class="size-option" data-size="2inch">
                                <div class="size-name">二寸照片</div>
                                <div class="size-dimensions">35×49mm<br>413×579px</div>
                            </div>
                            <div class="size-option" data-size="small2inch">
                                <div class="size-name">小二寸</div>
                                <div class="size-dimensions">33×48mm<br>390×567px</div>
                            </div>
                            <div class="size-option" data-size="idcard">
                                <div class="size-name">身份证</div>
                                <div class="size-dimensions">26×32mm<br>358×441px</div>
                            </div>
                            <div class="size-option" data-size="passport">
                                <div class="size-name">护照/签证</div>
                                <div class="size-dimensions">33×48mm<br>390×567px</div>
                            </div>
                        </div>

                        <div class="selected-size-info" id="selectedSizeInfo" style="display: none;">
                            <p>已选择：<strong id="selectedSizeName"></strong></p>
                        </div>
                    </div>

                    <div class="actions-section">
                        <button class="action-btn primary" onclick="convertPhoto()" id="convertBtn" disabled>
                            <i class="fas fa-magic"></i> 转换照片
                        </button>
                        <button class="action-btn secondary" onclick="downloadPhoto()" id="downloadBtn" disabled>
                            <i class="fas fa-download"></i> 下载照片
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/photo.js"></script>
</body>
</html>
