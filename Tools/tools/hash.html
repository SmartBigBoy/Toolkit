<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>哈希计算 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .hash-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .hash-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            text-align: center;
        }

        .hash-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .hash-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .hash-body {
            padding: 32px;
        }

        .input-section {
            margin-bottom: 24px;
        }

        .input-label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hash-textarea {
            width: 100%;
            min-height: 120px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-primary);
            resize: vertical;
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            transition: all 0.2s;
        }

        .hash-textarea:focus {
            outline: none;
            border-color: #ec4899;
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
            background: var(--bg-secondary);
        }

        .file-section {
            margin-bottom: 24px;
        }

        .file-upload-area {
            padding: 20px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 2px dashed var(--border);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .file-upload-area:hover {
            border-color: #ec4899;
            background: rgba(236, 72, 153, 0.05);
        }

        .file-upload-area i {
            font-size: 48px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
        }

        .file-upload-text {
            font-size: 15px;
            color: var(--text-primary);
            font-weight: 600;
        }

        .file-upload-hint {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.35);
            width: 100%;
            margin-bottom: 24px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.45);
        }

        .results-grid {
            display: grid;
            gap: 12px;
        }

        .result-card {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .result-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
        }

        .copy-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .copy-btn:hover {
            background: var(--border);
        }

        @media (max-width: 768px) {
            .hash-body {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="hash-container">
                <div class="hash-header">
                    <h2><i class="fas fa-shield-alt"></i> 哈希计算工具</h2>
                    <p>计算文本或文件的MD5、SHA-1、SHA-256哈希值</p>
                </div>

                <div class="hash-body">
                    <div class="input-section">
                        <div class="input-label">
                            <i class="fas fa-keyboard"></i> 输入文本
                        </div>
                        <textarea id="inputText" class="hash-textarea" placeholder="输入要计算哈希的文本..."></textarea>
                    </div>

                    <div class="file-section">
                        <div class="input-label">
                            <i class="fas fa-file-upload"></i> 或上传文件
                        </div>
                        <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <div class="file-upload-text">点击选择文件</div>
                            <div class="file-upload-hint">支持任意文件类型</div>
                        </div>
                        <input type="file" id="fileInput" accept="*" onchange="handleFileUpload(event)" style="display: none;">
                    </div>

                    <button class="action-btn" onclick="calculateHash()">
                        <i class="fas fa-magic"></i> 计算哈希
                    </button>

                    <div class="results-grid">
                        <div class="result-card">
                            <span class="result-label"><i class="fas fa-hashtag"></i> MD5</span>
                            <span class="result-value" id="md5Result">---</span>
                            <button class="copy-btn" onclick="copyResult('md5Result')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label"><i class="fas fa-hashtag"></i> SHA-1</span>
                            <span class="result-value" id="sha1Result">---</span>
                            <button class="copy-btn" onclick="copyResult('sha1Result')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label"><i class="fas fa-hashtag"></i> SHA-256</span>
                            <span class="result-value" id="sha256Result">---</span>
                            <button class="copy-btn" onclick="copyResult('sha256Result')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/hash.js"></script>
</body>
</html>
