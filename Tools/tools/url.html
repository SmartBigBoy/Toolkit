<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL编码 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <h2><i class="fas fa-link"></i> URL编码工具</h2>
            <p class="description">URL编码与解码</p>

            <div class="tool-container">
                <div class="toolbar">
                    <button onclick="encodeUrl()">编码</button>
                    <button onclick="decodeUrl()">解码</button>
                    <button onclick="copyResult()">复制结果</button>
                    <button onclick="clearAll()" class="secondary">清空</button>
                </div>
                <div class="panels">
                    <textarea id="input" placeholder="输入URL或文本..."></textarea>
                    <textarea id="output" readonly placeholder="结果..."></textarea>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/url.js"></script>
</body>
</html>
