<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>进制转换 - 在线工具箱</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .convert-container {
            max-width: 750px;
            margin: 0 auto;
            background: var(--bg-secondary);
            border-radius: 20px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .convert-header {
            padding: 28px 32px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            text-align: center;
        }

        .convert-header h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .convert-header p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .convert-body {
            padding: 32px;
        }

        .input-section {
            margin-bottom: 24px;
        }

        .input-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            align-items: end;
        }

        .input-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .input-item label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .convert-input {
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background: var(--bg-primary);
            transition: all 0.2s;
            font-weight: 600;
        }

        .convert-input:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .convert-select {
            padding: 14px 12px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .convert-select:focus {
            outline: none;
            border-color: #f59e0b;
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }

        .swap-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
        }

        .swap-btn:hover {
            transform: rotate(180deg);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
        }

        .action-btn {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.35);
            width: 100%;
            margin-bottom: 24px;
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .result-card {
            padding: 16px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .result-label {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .result-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'SF Mono', 'Monaco', 'Menlo', monospace;
            word-break: break-all;
        }

        .copy-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            align-self: flex-start;
        }

        .copy-btn:hover {
            background: var(--border);
        }

        @media (max-width: 768px) {
            .convert-body {
                padding: 20px;
            }

            .input-row {
                grid-template-columns: 1fr;
            }

            .swap-btn {
                width: 100%;
                height: 50px;
                border-radius: 12px;
                transform: rotate(90deg);
            }

            .swap-btn:hover {
                transform: rotate(270deg);
            }

            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="../index.html" class="logo">
                <i class="fas fa-wrench"></i>
                <h1>在线工具箱</h1>
            </a>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <div class="convert-container">
                <div class="convert-header">
                    <h2><i class="fas fa-calculator"></i> 进制转换工具</h2>
                    <p>二进制、八进制、十进制、十六进制之间的相互转换</p>
                </div>

                <div class="convert-body">
                    <div class="input-section">
                        <div class="input-row">
                            <div class="input-item">
                                <label>输入值</label>
                                <input type="text" id="inputValue" class="convert-input" placeholder="输入数字">
                                <select id="fromBase" class="convert-select">
                                    <option value="2">二进制</option>
                                    <option value="8">八进制</option>
                                    <option value="10" selected>十进制</option>
                                    <option value="16">十六进制</option>
                                </select>
                            </div>
                            
                            <button class="swap-btn" onclick="swapBases()" title="互换进制">
                                <i class="fas fa-exchange-alt"></i>
                            </button>
                            
                            <div class="input-item">
                                <label>目标进制</label>
                                <select id="toBase" class="convert-select">
                                    <option value="2">二进制</option>
                                    <option value="8">八进制</option>
                                    <option value="10">十进制</option>
                                    <option value="16" selected>十六进制</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <button class="action-btn" onclick="convertBase()">
                        <i class="fas fa-magic"></i> 开始转换
                    </button>

                    <div class="results-grid">
                        <div class="result-card">
                            <span class="result-label">二进制</span>
                            <span class="result-value" id="binaryResult">---</span>
                            <button class="copy-btn" onclick="copyResult('binaryResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">八进制</span>
                            <span class="result-value" id="octalResult">---</span>
                            <button class="copy-btn" onclick="copyResult('octalResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">十进制</span>
                            <span class="result-value" id="decimalResult">---</span>
                            <button class="copy-btn" onclick="copyResult('decimalResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                        <div class="result-card">
                            <span class="result-label">十六进制</span>
                            <span class="result-value" id="hexResult">---</span>
                            <button class="copy-btn" onclick="copyResult('hexResult')">
                                <i class="fas fa-copy"></i> 复制
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 在线工具箱 | 简洁高效的工具集合</p>
        </div>
    </footer>

    <script src="../js/tools/convert.js"></script>
</body>
</html>
